# configs/txxx.yaml
# WIP; check if it shares more in common with FamilyPorn.tv than ust selectors—if so, crib

name: TXXX
shortcode: tx
domain: txxx.video
base_url: "https://txxx.video"
selector_style: css
no_overwrite: true
use_selenium: true
download:
  method: "requests"
url_encoding_rules:
  " ": "-"
note: "This site has only very basic support"

modes:
  video:
    url_pattern: "/{any}/{video}/"
    scraper: video_scraper
    tip: "Download a video using its unique identifier"
    examples:
      - ""
  search:
    url_pattern: "/search/{search}/"
    scraper: list_scraper
    tip: "Download videos from search results"
    examples:
      - "Family therapy trust me"
scrapers:
  video_scraper:
    title:
      selector: "head title"
    download_url:
      selector: "#kt_player > div.fp-player > video"
      attribute: "src"
    studios:
      selector: "div.video-info div.holder div.item a.site div.text"
    actors:
      selector: "div.video-info div.holder div.item div.star a.link"
    description:
      selector: "div.description div.player-text"
    tags:
      selector: "ul.details-tags li.item a.link span.text, ul.top-tags li.item a.link span.text"

  list_scraper:
    video_container:
      selector:
        - "#list_videos_videos_list_search_result_items"
        - "#list_videos_common_videos_list_items"
    video_item:
      selector: "li.item > div.thumb-horizontal > a.link"
      fields:
        url:
          attribute: "href"
        title: {}
#    pagination:
#      next_page:
#        selector: "ul.pagination li.next a.primary-link"
#        attribute: "data-parameters"
    pagination:
      next_page:
        selector: "li.next a"  # Updated selector
        attribute: "href"
