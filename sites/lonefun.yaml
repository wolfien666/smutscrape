# sites/lonefun.yml

name: LoneFun
shortcode: lf
domain: LoneFun.com
base_url: "https://lonefun.com"
selector_style: css
no_overwrite: true
download:
  method: "requests"
name_suffix: " - LONEFUN"
note: "LoneFun tries to be the YouTube of taboo content but ends up more like early 2000s video hosting. Lots of 'real' amateur content mixed with obvious fakes. The search actually works though, which puts it ahead of half the sites on this list. Just don't expect HD quality - most videos look like they were filmed on a calculator."

modes:
  video:
    url_pattern: "/watch/{video}"
    scraper: video_scraper
    tip: "Download video with identifier"
    examples:
      - "real-incest-mom-jerks-off-son_3UqzBD5TZFbtfOt"
      - "bro-sis-fucking-after-church_jl874VUHpYezFId"
  search:
    url_pattern: "/search?keyword={search}"
    url_pattern_pages: "/search?keyword={search}&page_id={page}"
    max_pages: 999
    scraper: list_scraper
    tip: "Download videos from search results"
    examples:
      - "Real Incest"
      - "Mom"

scrapers:
  video_scraper:
    title:
      selector: "h2.tag_video_title"
    download_url:
      selector: "video source"
      attribute: "src"
    description:
      selector: "meta[name='description']"
      attribute: "content"
    tags:
      selector: "meta[name='keywords']"
      attribute: "content"

  list_scraper:
    video_container:
      selector:
        - "div.row.tag_video_grid.author-list.videos-latest-list"
    video_item:
      selector: "div.video-list.tag_video_grid_list"
      fields:
        url:
          selector: "a.position-relative.d-block.thumb"
          attribute: "href"
        title:
          selector: "h4 a"
        views:
          selector: "div.foot"
          regex: '(\d+,?\d*)\s+Views'
        duration:
          selector: "div.duration"
