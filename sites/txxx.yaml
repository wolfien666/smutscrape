# configs/txxx.yaml
# WIP; check if it shares more in common with FamilyPorn.tv than ust selectors—if so, crib

name: TXXX
shortcode: tx
domain: txxx.video
base_url: "https://txxx.video"
remove_title_string: " - HD XXX Porn Video | TXXX.Video"
selector_style: css
no_overwrite: true
use_selenium: true
download:
  method: "requests"
url_encoding_rules:
  " ": "-"
note: "This site has only very basic support"

modes:
  video:
    url_pattern: "/{any}/{video}/"
    scraper: video_scraper
    tip: "Download a video using its unique identifier"
    examples:
      - ""
  search:
    url_pattern: "/search/{search}/"
    scraper: list_scraper
    tip: "Download videos from search results"
    examples:
      - "Family therapy trust me"
scrapers:
  video_scraper:
    title:
      selector: "head title"
    description:
      selector: "div.block-details div.info div.item:contains('Description:') em"
    studios:
      selector: "div.block-details div.info div.item:contains('Channel:') a, div.block-details div.info div.item:contains('Sponsored by:') a"
    actors:
      selector: "div.block-details div.info div.item:contains('Models:') a"
    tags:
      selector: "div.block-details div.info div.item:contains('Categories:') a, div.block-details div.info div.item:contains('Tags:') a"
    download_url:
      selector: "#kt_player > div.fp-player > video"
      attribute: "src"
    
  list_scraper:
    video_container:
      selector:
        - "#list_videos_videos_list_search_result_items"
        - "#list_videos_common_videos_list_items"
    video_item:
      selector: "div.item > a"
      fields:
        url:
          attribute: "href"
        title:
          selector: "strong.title"
    pagination:
      next_page:
        selector: "ul.pagination li.next a.primary-link"
        attribute: "data-parameters"

