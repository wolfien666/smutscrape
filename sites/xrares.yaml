# sites/xrares.yaml

name: Xrares
shortcode: xr
domain: Xrares.com
base_url: "https://www.xrares.com"
selector_style: css
no_overwrite: true
use_selenium: true
download:
  method: "yt-dlp"
url_encoding_rules:
  " ": "-"
  "%20": "-"

modes:
  video:
    url_pattern: "/video/{any}/{video}"
    scraper: video_scraper
    tip: "Download video with identifier"
    examples:
      - ""
  search:
    scraper: list_scraper
    url_pattern: "/search/videos?search_query={search}"
    url_pattern_pages: "/search/videos?search_query={search}&page={page}"
    url_encoding_rules:
      " ": "+"
      "%20": "+"
    tip: "Download videos from search results"
    examples:
      - ""

scrapers:
  video_scraper:
    title:
      selector: "div.video-title strong"
    tags:
      selector: "div.metadata-row.video-tags a.is-keyword"
      postProcess:
        - replace:
            - regex: "Edit tags and models"
              with: ""
    actors:
      selector: "div.metadata-row.video-tags a.is-pornstar"
    studios:
      selector: "span.metadata a.gold-plate, span.metadata a.free-plate"
    description:
      selector: "p.metadata-row.video-description"
      postProcess:
        - replace:
            - regex: "^\\+More videos like this one at .*?\n"
              with: ""
    date:
      selector: "script[type='application/ld+json']"
      postProcess:
        - replace:
            - regex: '.*"uploadDate":\s*"([^"]+)".*'
              with: "\\1"
        - parseDate: "%Y-%m-%dT%H:%M:%S%z"
    image:
      selector: "script:contains('setThumbUrl169')"
      postProcess:
        - replace:
            - regex: ".*setThumbUrl169\\(['\"]([^'\"]+)['\"]\\).*"
              with: "\\1"

  list_scraper:
    video_container:
      selector:
        - "div#psvideos div.mozaique.cust-nb-cols"
        - "div#content-thumbs div.mozaique.cust-nb-cols"
    video_item:
      selector: "div.thumb-under a"
      fields:
        url:
          attribute: "href"
        title:
          attribute: "title"