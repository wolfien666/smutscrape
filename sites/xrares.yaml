# sites/xrares.yaml

name: Xrares
shortcode: xr
domain: Xrares.com
base_url: "https://www.xrares.com"
selector_style: css
no_overwrite: true
use_selenium: false
download:
  method: "yt-dlp"
url_encoding_rules:
  " ": "-"
  "%20": "-"

modes:
  video:
    url_pattern: "/video/{any}/{video}"
    scraper: video_scraper
    tip: "Download video with identifier"
    examples:
      - ""
  search:
    scraper: list_scraper
    url_pattern: "/search/videos?search_query={search}"
    url_pattern_pages: "/search/videos?search_query={search}&page={page}"
    url_encoding_rules:
      " ": "+"
      "%20": "+"
    tip: "Download videos from search results"
    examples:
      - ""

scrapers:
  video_scraper:
    title:
      selector: "meta[property='og:title']"
      attribute: "content"
    description:
      selector: "meta[property='og:description']"
      attribute: "content"
    tags:
      selector: "meta[property='video:tag']"
      attribute: "content"
      multiple: true

  list_scraper:
    video_container:
      selector: "div.col-md-12 > div.row"
    video_item:
      selector: "div.well.well-sm"
    fields:
      url:
        selector: "a"
        attribute: "href"
      title:
        selector: "a img"
        attribute: "title"