# sites/9vids.yaml

name: 9Vids
shortcode: 9v
domain: 9vids.com
base_url: "https://9vids.com"
selector_style: css
no_overwrite: true
use_selenium: true
download:
  method: "yt-dlp"
url_encoding_rules:
  " ": "-"
  "%20": "-"
name_suffix: " - 9vids"
remove_title_string: " - 9vids"
note: "In May 2025, 9vids went offline for a short period, and since it has come back online, hosts far fewer and far less exciting incest videos. It used to be one of the top sources for \"real\" incest porn on the internet, now it is merely OK."

modes:
  video:
    url_pattern: "/video/{video}/"
    scraper: video_scraper
    tip: "Download video with identifier"
    examples:
      - "sister-facesitting-deepthroats-hard-fucks"
      - "sister-seduces-me-for-rimming-and-anal"
      - "anal-camming-tryout-with-my-sister"
      - "i-dream-of-getting-my-brother-in-my-ass"
  search:
    url_pattern: "/video-tag/{search}/"
    scraper: list_scraper
    tip: "Download videos from tag/search results"
    examples:
      - "sister"
      - "brother"
      - "incest"
      - "taboo"
  tag:
    url_pattern: "/video-tag/{tag}/"
    scraper: list_scraper
    tip: "Download videos with tag"
    examples:
      - "big-sister"
      - "creampie"
      - "incest"
      - "taboo"

scrapers:
  video_scraper:
    title:
      selector: "head title"
    description:
      selector: "meta[name='description']"
      attribute: "content"
    download_url:
      selector: "video#video source[type='video/mp4']"
      attribute: "src"
    tags:
      selector: "aside.folio-skills ul li a"

  list_scraper:
    video_container:
      selector:
        - "ul.folio-items.folio-grid-items"
    video_item:
      selector: "li.folio-item a.folio-link"
      fields:
        url:
          attribute: "href"
        title:
          attribute: "title"

