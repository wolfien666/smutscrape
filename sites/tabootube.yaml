
name: TabooTube
shortcode: tt
domain: TabooTube.xxx
base_url: "https://www.tabootube.xxx"
selector_style: css
no_overwrite: true
use_selenium: true
download:
  method: "yt-dlp"
url_encoding_rules:
  " ": "-"
  "%20": "-"

modes:
  video:
    url_pattern: "/{video}/"
    scraper: video_scraper
    tip: "Download video with identifier"
    examples:
      - "bro-sister-vintage-collection-part-1"
  search:
    scraper: list_scraper
    url_pattern: "/search/{search}/"
    tip: "Download videos from search results"
    examples:
      - "sister"

scrapers:
  video_scraper:
    title:
      selector: "title"
    description:
      selector: "div.item.video-desc em"
    tags:
      selector: "div.item:contains('Tags') a"
      multiple: true
    actors:
      selector: "div.item:contains('Models') a"
      multiple: true
    studios:
      selector: "h2.content-source-title a"
    date:
      selector: "div.info span:contains('Submitted') em"
      postProcess:
        - parseRelativeDate: true
    download_url:
      selector: "video.fp-engine"
      attribute: "src"

  list_scraper:
    video_container:
      selector: "#list_videos_videos_list_search_result_items"
    video_item:
      selector: "div.item"
      fields:
        url:
          selector: "a"
          attribute: "href"
        title:
          selector: "strong.title"
    pagination:
      next_page:
        selector: "li.next a"
        attribute: "data-parameters"
